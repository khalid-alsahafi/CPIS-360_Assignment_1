<!DOCTYPE html>
<html>
   <head>
      <meta charset="utf-8">
      <title>Lab 04: WebAR Experience</title>
      <!-- 1. Load A-Frame -->
      <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
      <!-- 2. Load AR.js -->
      <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
   </head>
   <body>
      <!-- 3. Create the Scene -->
      <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
         <!-- 4. Define the Marker -->
         <a-marker preset="hiro">
            <!-- 5. Add 3D Content
            <a-box
               position="0 0 0"
               material="color: #EF2D5E; transparent: true; opacity: 0.9;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
             -->
             <a-box material="color: red;"
                 position="0 5 0"></a-box>
             <a-sphere material="color: green;"
                 position="1 1 0"
                 radius="0.5"></a-sphere>
             <a-torus material="color: blue;"
                 position="0 0 1"
                 animation="property: rotation; to: 0 360 180; loop: true; dur: 5000"></a-torus>

            <a-text
               value="Hello WebAR!"
               position="0 0 0"
               align="center"
               color="#FFFFFF"
               width="4"></a-text>
         </a-marker>
         <!-- 6. Add the Camera -->
         <camera fov="90"></camera>
      </a-scene>
   </body>
</html>
